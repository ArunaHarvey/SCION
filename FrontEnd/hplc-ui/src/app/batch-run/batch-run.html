<div class="batch-container">

  <!-- ========================= -->
  <!-- AVAILABLE BATCHES -->
  <!-- ========================= -->
  <h3>Available Batches</h3>

  <table class="batch-table">
    <thead>
      <tr>
        <th class="col-name">Batch</th>
        <th class="col-actions">Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let batchName of (availableBatches$ | async)">
        <td>{{ batchName }}</td>
        <td>
          <button class="btn" (click)="addToQueue(batchName)">
            Add
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <hr />

  <!-- ========================= -->
  <!-- RUN QUEUE -->
  <!-- ========================= -->
  <h3>Run Queue</h3>

  <ng-container *ngIf="queue$ | async as queue">

    <table class="batch-table" *ngIf="queue.length > 0">
      <thead>
        <tr>
          <th class="col-name">Batch</th>
          <th class="col-status">Status</th>
          <th class="col-queue">Queue Position</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let batch of queue">
          <td>{{ batch.batchName }}</td>
          <td>{{ batch.status }}</td>
          <td>{{ batch.queuePosition }}</td>

          <td>
            <div class="action-group">
              <button
                class="btn"
                (click)="run(batch.batchName)"
                [disabled]="batch.status !== 'Queued'">
                Run
              </button>

              <button
                class="btn btn-danger"
                (click)="delete(batch.batchName)"
                [disabled]="batch.status !== 'Queued'">
                Delete
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>

    <p *ngIf="queue.length === 0" class="empty-text">
      No batches in queue.
    </p>

  </ng-container>

  <hr />

  <!-- ========================= -->
  <!-- SAMPLE EXECUTION -->
  <!-- ========================= -->
  <h3 *ngIf="execution$">Sample Execution</h3>

  <table class="batch-table" *ngIf="execution$ | async as execution">
    <thead>
      <tr>
        <th>Sample</th>
        <th>State</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let sample of execution">
        <td>{{ sample.sampleName }}</td>
        <td>{{ sample.state }}</td>
      </tr>
    </tbody>
  </table>

  <hr />

  <!-- ========================= -->
  <!-- CLEAR QUEUE -->
  <!-- ========================= -->
  <div class="footer-actions">
    <button class="btn btn-clear" (click)="clear()">
      Clear Queue
    </button>
  </div>

</div>
