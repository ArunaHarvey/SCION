<div class="status-bar">

  <div class="device">
    <b>MS</b>
    <div class="light" [class.green]="ms?.busy"></div>
    <div>{{ ms?.busy ? 'Busy' : 'Idle' }}</div>
  </div>

  <div class="device" *ngFor="let lc of lcs">
    <b>HPLC {{ lc.lcId }}</b>
    <div class="light" [ngClass]="lcColor(lc.state)"></div>
    <div>{{ lc.state }}</div>
  </div>

</div>

<!-- Live Chromatogram -->
<svg *ngIf="chromKey > 0"
     width="600"
     height="200"
     class="chrom">
  <polyline
    [attr.points]="chrom.map((p,i)=> i*2 + ',' + (180 - p.intensity)).join(' ')"
    fill="none"
    stroke="#00c853"
    stroke-width="1">
  </polyline>
</svg>
