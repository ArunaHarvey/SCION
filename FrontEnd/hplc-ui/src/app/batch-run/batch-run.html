<h2 class="page-title">Batch Run</h2>

<!-- Batch Library -->
<div class="panel">
  <h3>Batch Library</h3>
  <table>
    <tr>
      <th>Batch</th>
      <th>Action</th>
    </tr>
    <tr *ngFor="let b of (availableBatches$ | async)">
      <td>{{ b }}</td>
      <td>
        <button class="secondary"
                (click)="addToQueue(b)">
          Add to Queue
        </button>
      </td>
    </tr>
  </table>
</div>

<!-- Run Queue -->
<div class="panel">
  <h3>Run Queue</h3>
  <table>
    <tr>
      <th>Batch</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>

    <tr *ngFor="let q of (queue$ | async)">
      <td>{{ q.batchName }}</td>
      <td>
        <span class="status"
              [class.queued]="q.status === 'Queued'"
              [class.running]="q.status === 'Running'">
          {{ q.status }}
        </span>
      </td>
      <td>
        <!-- ✅ RUN BUTTON -->
        <button class="primary"
                *ngIf="q.status === 'Queued'"
                (click)="run(q.batchName)">
          Run
        </button>

        <!-- ✅ DELETE BUTTON -->
        <button class="danger"
                *ngIf="q.status === 'Queued'"
                (click)="delete(q.batchName)">
          Delete
        </button>
      </td>
    </tr>
  </table>

  <button class="danger" (click)="clear()">
    Clear Batch / Queue
  </button>
</div>

<!-- Live Execution -->
<div class="panel" *ngIf="execution$ | async as exec">
  <h3>Live Execution</h3>
  <table>
    <tr>
      <th>Sample</th>
      <th>LC</th>
      <th>MS</th>
      <th>Status</th>
    </tr>
    <tr *ngFor="let e of exec">
      <td>{{ e.sampleName }}</td>
      <td>{{ e.lcId }}</td>
      <td>{{ e.usesMS ? '⭐ MS' : '—' }}</td>
      <td>{{ e.state }}</td>
    </tr>
  </table>
</div>
